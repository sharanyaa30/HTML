<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header>
    <h1>QUIZ</h1>
    <p>Test your general knowledge!</p>
    <hr>
  </header>

  <section>
    <h2>Instructions</h2>
    <p>Select one answer for each question. Click "Submit" when you're done.</p>
  </section>

  <section>
    <form>
      <fieldset>
        <legend>Question 1: Capital of France</legend>
        <input type="radio" id="q1a" name="q1" value="London">
        <label for="q1a">London</label><br>

        <input type="radio" id="q1b" name="q1" value="Paris">
        <label for="q1b">Paris</label><br>

        <input type="radio" id="q1c" name="q1" value="Rome">
        <label for="q1c">Rome</label><br>
      </fieldset>

      <fieldset>
        <legend>Question 2: Largest planet</legend>
        <input type="radio" id="q2a" name="q2" value="Earth">
        <label for="q2a">Earth</label><br>

        <input type="radio" id="q2b" name="q2" value="Jupiter">
        <label for="q2b">Jupiter</label><br>

        <input type="radio" id="q2c" name="q2" value="Mars">
        <label for="q2c">Mars</label><br>
      </fieldset>

      <fieldset>
        <legend>Question 3: HTML stands for</legend>
        <input type="radio" id="q3a" name="q3" value="Hyperlinks and Text Markup Language">
        <label for="q3a">Hyperlinks and Text Markup Language</label><br>

        <input type="radio" id="q3b" name="q3" value="Home Tool Markup Language">
        <label for="q3b">Home Tool Markup Language</label><br>

        <input type="radio" id="q3c" name="q3" value="HyperText Markup Language">
        <label for="q3c">HyperText Markup Language</label><br>
      </fieldset>

      <br>
      <input type="submit" value="Submit Answers">
    </form>
  </section>

  </footer>
</body>
</html>
