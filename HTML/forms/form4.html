<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form2</title>
</head>
<body>
    <h3>Job Application</h3>
    <form>
        <label for="name">Name:</label>
        <br>
        <input name="name" id="name" type="text">
        <br>
        <br>
        <label for="email">Email:</label>
        <br>
        <input name="email" id="email" type="text">
        <br>
        <br>
        <label for="phone">Phone:</label>
        <br>
        <input name="phone" id="phone" type="tel">
        <br>
        <br>
        <label for="resume">Resume:</label>
        <br>
        <input id="resume" name="resume" type="file">
        <br>
        <br>
        <label for="count">Experience(in years)</label>
        <br>
        <input type="number" name="count" id="count" min="0" max="50">
        <br>
        <br>
        <fieldset>
                <legend>Skills</legend>
                <br>
                <label for="checkbox1">HTML</label>
                <input type="checkbox" name="checkbox1" id="Checkbox1">
                <br>
                <label for="checkbox2">CSS</label>
                <input type="checkbox" name="checkbox2" id="Checkbox2">
                <br>
                <label for="checkbox3">JAVA</label>
                <input type="checkbox" name="checkbox3" id="Checkbox3">
                <br>
                
        </fieldset>
        <label for="edu">Highest education:</label>
            <br>
            <select name="edu" id="edu">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C">C</option>
                <option value="D">D</option>
                <option value="E">E</option>
            </select>
        <fieldset>
            <legend>Availability</legend>

            <label for="radio1">full time</label>
            <br>
            <input id="radio1" name="radio" type="radio">
            <br>
            <label for="radio2">part time</label>
            <br>
            <input id="radio2" name="radio" type="radio">
            <br>
            
        </fieldset>
        <label for="textarea1">Additional comments</label>
        <br>
        <textarea name="textarea" id="textarea1" cols="30" rows="10"></textarea>

        <input type="submit" value="Submit application">


    </form>
</body>
</html>
