<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h3>Complex Form</h3>
    <fieldset>
        <legend>Personal Information</legend>
        <label for="name">Name:</label>
        <input id="name" type="text" name="name">
        <label for="email">Email:</label>
        <input id="email" type="text" name="email">
        <label for="phone">Phone</label>
        <input id="phone" type="tel" name="phone">
        <label for="date">Date of Birth</label>
        <input id="date" type="date" name="date">
        <span>Gender:</span>
        <label for="radio1">Male</label>
        <input type="radio" id="radio1" name="radio">
        <label for="radio2">Female</label>
        <input type="radio" id="radio2" name="radio">
        <label for="country">Country:</label>
        <select name="country id=country">
            <option value="country" >USA</option>
            <option value="country" >UK</option>
            <option value="country" >GERMANY</option>
            <option value="country" >ITALY</option>
        </select>
    </fieldset>
    <fieldset>
        <legend>Address:</legend>
        <label for="street">Street:</label>
        <input id="street" type="text" name="street">
        <label for="city">City:</label>
        <input id="city" type="city" name="city">
        <label for="State">State:</label>
        <input id="State" type="State" name="State">
        <label for="code">Zip code:</label>
        <input id="code" type="text" name="code">
        
    </fieldset>
    <fieldset>
        <legend>Other information</legend>
        <label for="textarea1">Additional comments</label>
        <br>
        <textarea name="textarea" id="textarea1" cols="30" rows="10"></textarea>
        <label for="checkbox">i agree to terms of service</label>
        <input id="checkbox" name="checkbox" type="checkbox">
    </fieldset>
    <input value="submit" type="submit">


</body>
</html>
